<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(주) 위트로지스 정산 조회</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f3f5f8;
}
.container {
  max-width:480px;
  margin:auto;
  min-height:100vh;
  background:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.hero {
  margin:20px;
  padding:25px;
  border-radius:20px;
  background:#0d2a4a;
  color:#fff;
  text-align:center;
}
.form-box {
  margin:20px;
  padding:25px;
  border-radius:20px;
  background:#fff;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.input, .btn {
  width:100%;
  height:50px;
  border-radius:12px;
  font-size:16px;
}
.input {
  border:1px solid #ddd;
  margin-bottom:10px;
  padding:0 10px;
}
.btn {
  background:#0d2a4a;
  color:#fff;
  border:none;
  cursor:pointer;
}
.result {
  margin:20px;
  padding:20px;
  border-radius:15px;
  background:#f1f3f7;
  display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h2>(주) 위트로지스</h2>
  <p>운송료 정산 조회</p>
</div>

<div class="form-box">
  <input id="phone" maxlength="4" class="input" placeholder="전화번호 뒤 4자리">
  <button class="btn" onclick="search()">조회하기</button>
</div>

<div id="result" class="result"></div>

</div>

<script>

// ✅ 여기만 너 시트 연결
const URL = "https://opensheet.elk.sh/1IOxOChst2mSW6F6bppPFjQEMT0PXNRi5slv91v15eDE/정산서";

async function search() {

  const phone = document.getElementById("phone").value;

  if (phone.length !== 4) {
    alert("4자리 입력해주세요");
    return;
  }

  const res = await fetch(URL);
  const data = await res.json();

  const found = data.find(row => 
  row["연락처"] && row["연락처"].replace(/[^0-9]/g, "").endsWith(phone)
);

  const box = document.getElementById("result");

  if (found) {
    box.style.display = "block";
    box.innerHTML = `
      <h3>${found["사업주 성명"] || "-"}</h3>
      <p>사업자 상호: ${found["사업자 상호"] || "-"}</p>
      <p>차량번호: ${found["차량번호"] || "-"}</p>
      <p>정산금액: ${Number(found["운송료"] || 0).toLocaleString()}원</p>
    `;
  } else {
    box.style.display = "block";
    box.innerHTML = "조회 결과 없음";
  }
}

</script>

</body>
</html>
