<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위트로지스 정산 조회</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f3f5f8;
}

.container {
  max-width:480px;
  margin:auto;
  background:#fff;
}

/* 이미지 영역 */
.hero {
  position:relative;
}

.hero img {
  width:100%;
  display:block;
}

/* 🔥 입력창을 이미지 위에 올림 */
.overlay {
  position:absolute;
  bottom:40px;
  left:20px;
  right:20px;
}

.input {
  width:100%;
  height:50px;
  border-radius:10px;
  border:none;
  padding:0 10px;
  font-size:16px;
  margin-bottom:10px;
}

.btn {
  width:100%;
  height:50px;
  border:none;
  border-radius:10px;
  background:#0d2a4a;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/* 결과 */
.result {
  margin:20px;
  padding:20px;
  border-radius:15px;
  background:#f1f3f7;
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <img src="조회화면2.png">

    <!-- 🔥 진짜 입력창 -->
    <div class="overlay">
      <input id="phone" maxlength="4" class="input" placeholder="전화번호 뒤 4자리">
      <button class="btn" onclick="search()">조회하기</button>
    </div>
  </div>

  <div id="result" class="result"></div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1IOxOChst2mSW6F6bppPFjQEMT0PXNRi5slv91v15eDE/정산서";

async function search() {

  const phone = document.getElementById("phone").value.trim();

  if (phone.length !== 4) {
    alert("4자리 입력");
    return;
  }

  const res = await fetch(URL);
  const data = await res.json();

  const found = data.find(row => {
    const key = Object.keys(row).find(k => k.includes("연락처"));
    const value = row[key];
    return value && value.replace(/[^0-9]/g, "").endsWith(phone);
  });

  const box = document.getElementById("result");

  if (found) {

    // 🔥 컬럼 자동 대응
    const get = (name) => {
      const key = Object.keys(found).find(k => k.includes(name));
      return found[key] || "-";
    };

    box.style.display = "block";
    box.innerHTML = `
      <h3>${get("성명")}</h3>
      <p>사업자 상호: ${get("상호")}</p>
      <p>차량번호: ${get("차량")}</p>
      <p>정산금액: ${Number(get("운송료") || 0).toLocaleString()}원</p>
    `;

  } else {
    box.style.display = "block";
    box.innerHTML = "<b>조회 결과 없음</b>";
  }
}

</script>

</body>
</html>
